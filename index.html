<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <div class="top-bar">
            <h1>Employee Management System</h1>

            <div>
                <button id="exportBtn">Export Employees</button>
                <button id="logoutBtn">Logout</button>
            </div>
        </div>

        <div class="dashboard-cards">
            <div class="card">
                <h3>Total Employees</h3>
                <p id="totalEmployees">0</p>
            </div>

            <div class="card">
                <h3>Total Departments</h3>
                <p id="totalDepartments">0</p>
            </div>

            <div class="card">
                <h3>New Employees</h3>
                <p id="newEmployees">0</p>
            </div>
        </div>

        <h2>Employee Registration Form</h2>

        <input type="text" id="name" placeholder="Employee Name">
        <input type="email" id="email" placeholder="Email Address">
        <input type="text" id="mobile" placeholder="Mobile Number">
        <input type="text" id="department" placeholder="Department">
        <input type="text" id="qualification" placeholder="Qualification">

        <button id="registerBtn">Register Employee</button>

        <hr>

        <h2>Employee List</h2>


<select id="departmentFilter">
    <option value="">All Departments</option>
</select>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search Employee...">
        </div>
<select id="sortFilter">
    <option value="">Sort Employees</option>
    <option value="nameAsc">Name A-Z</option>
    <option value="nameDesc">Name Z-A</option>
    <option value="latest">Latest First</option>
    <option value="oldest">Oldest First</option>
</select>
<button id="clearFilterBtn">Clear Filters</button>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Mobile</th>
                        <th>Department</th>
                        <th>Qualification</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="employeeTableBody"></tbody>
            </table>
        </div>

    </div>

    <div id="toast" class="toast"></div>

    <script type="module" src="js/register.js"></script>

</body>
</html>
